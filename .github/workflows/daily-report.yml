# Daily report — same routine as the local "TennisBot Daily Report" task.
#
# Runs the read-only analyzers against the Supabase Postgres database via
# run_daily_report.py and commits the dated report + match_waves CSV to the
# repo (readable from anywhere). Supabase is the durable store, so there is
# no database cache to restore or artifact to back up anymore.
#
# The daily commit also keeps the repository "active", which prevents GitHub
# from auto-disabling scheduled workflows after 60 days without activity.
#
# Secrets required:
#   DISCORD_WEBHOOK_URL   analyzers import config.settings, which requires it
#                         (nothing is sent)
#   SUPABASE_DB_URL       Supabase session-pooler connection string

name: Daily report

on:
  schedule:
    - cron: "0 4 * * *"   # 12:00 AM EDT / 11:00 PM EST — ready when the user wakes up
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Generate reports
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python run_daily_report.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports
          git diff --cached --quiet || git commit -m "Daily report $(date -u +%F)"
          git push
